spring.application.name=biomedical-twin

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true


spring.datasource.url=${SPRING_DATA_URL}
spring.datasource.username=${SPRING_DATA_USERNAME}
spring.datasource.password=${SPRING_DATA_PASSWORD}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- SECURED MOSQUITTO CONFIGURATION (PORT 8883) ---
mqtt.broker.url=ssl://127.0.0.1:8883
mqtt.client.id=gait_backend_java_dev
mqtt.topic.sensor=gait/sensor/data
mqtt.username=my_java_user
mqtt.password=${MQTT_PASSWORD}

mqtt.truststore.location=classpath:truststore.jks
mqtt.truststore.password=password